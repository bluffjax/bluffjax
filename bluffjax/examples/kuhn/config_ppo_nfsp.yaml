num_timesteps: 1e7
num_envs: 1024
num_steps_per_env_per_update: 64
num_epochs: 2
num_minibatches: 2

# BR (PPO) optimizer
lr: 2.5e-4
gamma: 1.0
gae_lambda: 1.0
clip_eps: 0.2
vf_clip: 0.2
ent_coef: 0.01
vf_coef: 1.0
max_grad_norm: 0.5

# Shared network architecture
fc_dim_size: 64

# NFSP-specific knobs
anticipatory_eta: 0.1
sl_reservoir_capacity: 50000
sl_batch_size: 256
sl_num_steps_per_update: 2
sl_lr: 3e-4

env_name: kuhn_poker
seed: 0
num_seeds: 5
env_kwargs: {}

# wandb
project: bluffjax
job_type: kuhn_ppo_nfsp
wandb: True
