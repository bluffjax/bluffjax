num_timesteps: 1e7
num_envs: 1024
num_steps_per_env_per_update: 64
num_epochs: 2
num_minibatches: 2

# PQN BR params
lr: 2.5e-4
start_e: 1.0
end_e: 0.05
exploration_fraction: 0.2
q_lambda: 0.9
max_grad_norm: 0.5

# Shared
gamma: 0.99
fc_dim_size: 128

# NFSP params
anticipatory_eta: 0.1
sl_reservoir_capacity: 100000
sl_batch_size: 256
sl_num_steps_per_update: 2
sl_lr: 3e-4

env_name: bluff
seed: 0
num_seeds: 2
env_kwargs:
  num_agents: 2
  num_ranks: 13
  num_suits: 4
  num_decks: 1
  horizon: 200

# comparison
compare: true
compare_mode: checkpoint # "random" or "checkpoint"
compare_with: /home/aryaman/Desktop/project-bluff/bluff/bluffjax/examples/bluff/checkpoints/bluff_ppo_nfsp_br_2026-03-03_21-29-57.msgpack
compare_network_type: actor_critic # "actor_critic", "q_network", or "actor"
compare_steps: 200
compare_interval: 10

# wandb
project: bluffjax
job_type: bluff_pqn_nfsp
wandb: true

# optional checkpoint save
save_final: false
save_dir: ./checkpoints
